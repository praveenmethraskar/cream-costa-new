version: "3.8"

services:
  app:
    build: .
    container_name: icecream-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/icecream
      - NODE_ENV=production
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    container_name: icecream-mongo
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

volumes:
  mongo_data: